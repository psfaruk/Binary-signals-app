# Railway build configuration (Nixpacks)
# Playwright needs system-level browser dependencies that pip alone
# can't install. This file tells Railway to install them at build time.

# ── Setup phase: install Python + system dependencies ─────────────────────
setup:
  - python: "3.11"

# ── Install phase: pip + playwright browser + system libs ─────────────────
# Playwright's Chromium needs these shared libraries on Debian/Ubuntu:
phases:
  install:
    commands:
      - apt-get update && apt-get install -y
          libnss3
          libnspr4
          libatk1.0-0
          libatk-bridge2.0-0
          libcups2
          libdrm2
          libdbus-1-3
          libxcb1
          libxkbcommon0
          libx11-6
          libxcomposite1
          libxdamage1
          libxext6
          libxfixes3
          libxrandr2
          libgbm1
          libpango-1.0-0
          libcairo2
          libasound2
          libatspi2.0-0
          libxshmfence1
          fonts-liberation
      - pip install -r requirements.txt
      - playwright install chromium
      - playwright install-deps chromium

# ── Start command ─────────────────────────────────────────────────────────
start:
  command: python server.py
